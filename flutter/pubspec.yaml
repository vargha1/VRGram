publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  fixnum: ^1.1.1
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  grpc: ^5.1.0
  intl: ^0.20.3
  jni: ^1.0.0
  protobuf: ^6.0.0
  riverpod_annotation: ^4.0.3
  share_plus: ^12.0.2
