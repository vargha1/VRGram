dev_dependencies:
  build_runner: ^2.15.1
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  riverpod_generator: ^4.0.4

flutter:
  uses-material-design: true
