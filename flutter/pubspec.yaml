name: vrgram
description: DNS-transport social/messaging platform
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  fixnum: any
  flutter:
    sdk: flutter
  flutter_riverpod: any
  go_router: any
  grpc: any
  intl: any
  jni: any
