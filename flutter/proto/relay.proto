syntax = "proto3";
package relaypb;
option go_package = "github.com/user/dns-transport/pkg/relaypb";

service RelayClient {
  rpc SendMessage(SendRequest) returns (SendResponse);
  rpc PollMessages(PollRequest) returns (PollResponse);
  rpc GetRelayStatus(Empty) returns (RelayStatusList);
  rpc AddRelay(RelayEndpoint) returns (Empty);
  rpc RemoveRelay(RelayEndpoint) returns (Empty);
  rpc GetIdentity(Empty) returns (IdentityInfo);
  rpc AddPeer(PeerInfo) returns (Empty);
  rpc GetTransportStatus(Empty) returns (TransportStatusResponse);

  // New media RPCs
  rpc SendMedia(SendMediaRequest) returns (SendMediaResponse);
  rpc GetMediaStatus(GetMediaStatusRequest) returns (MediaStatusResponse);
  rpc CancelSend(CancelSendRequest) returns (Empty);
  rpc SendMediaStream(stream MediaUploadChunk) returns (SendMediaResponse);
  rpc GenerateInviteCode(GenerateInviteCodeRequest) returns (GenerateInviteCodeResponse);
  rpc JoinViaCode(JoinViaCodeRequest) returns (JoinViaCodeResponse);
  rpc RemovePeer(PeerInfo) returns (Empty);
  rpc ListPeers(Empty) returns (ListPeersResponse);
  rpc CreateGroup(CreateGroupRequest) returns (CreateGroupResponse);
  rpc ListGroups(Empty) returns (ListGroupsResponse);
  rpc LeaveGroup(LeaveGroupRequest) returns (Empty);
  rpc RemoveGroupMember(RemoveGroupMemberRequest) returns (Empty);
}

message SendMediaRequest {
  string peer_pubkey = 1;
  bytes media_data = 2;
  string filename = 3;
  string mime_type = 4;
  enum Transport {
    AUTO = 0;
    DNS = 1;
    LIBP2P = 2;
  }
  Transport preferred_transport = 5;
}

message SendMediaResponse {
  string message_id = 1;
  int32 estimated_seconds = 2;
  string transport = 3;
}

message GetMediaStatusRequest {
  string message_id = 1;
}

message MediaStatusResponse {
  string message_id = 1;
  enum Status {
    QUEUED = 0;
    SENDING = 1;
    ARRIVING = 2;
    COMPLETE = 3;
    FAILED = 4;
  }
  Status status = 2;
  int32 progress_pct = 3;
  string error = 4;
}

message CancelSendRequest {
  string message_id = 1;
}

message MediaUploadChunk {
  string transfer_id = 1;
  bytes data = 2;
  uint32 chunk_index = 3;
}

message SendRequest {
  string peer_pubkey = 1;
  bytes plaintext = 2;
  uint64 client_timestamp_ms = 3;
  string group_id = 4;
}

message SendResponse {
  string message_id = 1;
  bool queued = 2;
  int32 chunk_count = 3;
}

message PollRequest {}

message PollResponse {
  repeated ReceivedMessage messages = 1;
}

message ReceivedMessage {
  string from_peer = 1;
  string message_id = 2;
  bytes plaintext = 3;
  int64 timestamp = 4;
  uint64 server_timestamp_ms = 5;
  uint64 sequence_number = 6;
  string group_id = 7;
}

message Empty {}

message RelayEndpoint {
  string address = 1;
}

message RelayStatusList {
  repeated RelayStatus endpoints = 1;
}

message RelayStatus {
  string address = 1;
  bool reachable = 2;
  int64 latency_ms = 3;
  string last_error = 4;
  bool blackout_mode = 5;
}

message IdentityInfo {
  string pubkey = 1;
}

message PeerInfo {
  string nickname = 1;
  string pubkey = 2;
}

message GenerateInviteCodeRequest {
  string nickname = 1;
}
message GenerateInviteCodeResponse {
  string code = 1;
}
message JoinViaCodeRequest {
  string code = 1;
}
message JoinViaCodeResponse {
  string peer_nickname = 1;
  string peer_pubkey = 2;
}
message ListPeersResponse {
  repeated PeerInfo peers = 1;
}
message CreateGroupRequest {
  string name = 1;
  repeated string member_pubkeys = 2;
}
message CreateGroupResponse {
  string group_id = 1;
}
message LeaveGroupRequest {
  string group_id = 1;
}
message RemoveGroupMemberRequest {
  string group_id = 1;
  string member_pubkey = 2;
}
message ListGroupsResponse {
  repeated GroupInfo groups = 1;
}
message GroupInfo {
  string group_id = 1;
  string name = 2;
  string admin_pubkey = 3;
  repeated GroupMember members = 4;
  uint64 key_epoch = 5;
}
message GroupMember {
  string pubkey = 1;
  string nickname = 2;
  string role = 3;
}

message TransportStatusResponse {
  bool dht_connected = 1;
  int32 discovered_relays = 2;
  bool libp2p_direct = 3;
  bool libp2p_circuit = 4;
  string dns_mode = 5;
}
